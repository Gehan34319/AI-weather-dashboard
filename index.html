<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-container">
        <header>
            <h1>AI Weather Dashboard</h1>
            <p>Get real-time insights and forecasts powered by AI</p>
        </header>

        <main>
            <section class="search-section">
                <input type="text" id="city-input" placeholder="Enter city name...">
                <button id="search-btn">Search Weather</button>
            </section>

            <section class="weather-card" id="weather-display">
                <h2 id="city-name">City Name</h2>
                <div class="weather-info">
                    <p class="temp"><span id="temperature">--</span>°C</p>
                    <p class="desc" id="description">Condition</p>
                </div>
                <div class="ai-insights">
                    <h3>🤖 AI Summary</h3>
                    <p id="ai-recommendation">Enter a city to generate AI-powered clothing and activity recommendations.</p>
                </div>
                <div class="favorites-section">
    <h3>⭐ Saved Cities</h3>
    <div id="favorites-list">
        </div>
</div>
            </section>
        </main>
    </div>

    <script src="scrpt.js"></script>
</body>
</html>
